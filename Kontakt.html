<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontakta oss</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contact-container{
    background:white;
    padding:40px;
    border-radius:16px;
    width:500px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#111827;
}

p{
    color:#6b7280;
    margin-bottom:25px;
}

.contact-box{
    background:#f9fafb;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

.contact-box h3{
    color:#2563eb;
    margin-bottom:10px;
}

.contact-box a{
    text-decoration:none;
    color:#111827;
    font-weight:600;
}

.contact-box a:hover{
    color:#2563eb;
}

.back-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.2s;
}

.back-btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="contact-container">

    <h1>Kontakta oss</h1>

    <p>
        Har du frågor eller behöver hjälp? Du kan kontakta oss via e-post eller telefon.
    </p>

    <div class="contact-box">
        <h3>📧 E-post</h3>
        <a href="mailto:info@skolportal.se">
            info@skolportal.se
        </a>
    </div>

    <div class="contact-box">
        <h3>📞 Telefon</h3>
        <a href="tel:+46123456789">
            012-345 67 89
        </a>
    </div>

    <a href="index.html" class="back-btn">
        Tillbaka till startsidan
    </a>

</div>

</body>
</html>
