<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
}

/* HEADER */
header {
    background: #C40064;
    color: white;
    padding: 15px;
    text-align: center;
}

/* LAYOUT */
.container {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: white;
    padding: 20px;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

.sidebar ul {
    list-style: none;
}

.sidebar li {
    margin: 8px 0;
}

/* KNAPP-LÄNKAR */
.sidebar a {
    text-decoration: none;
    color: black;
    display: block;
    padding: 12px;
    background: #eef2f7;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #dbe5f1;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.schedule-table {
    width: 100%;
    border-collapse: collapse;
}

.schedule-table th,
.schedule-table td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

.schedule-table th {
    background: #003366;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>Skolportal 🎓</h1>

            <li><a href="installningar.html">⚙️ Inställningar</a></li>
        </ul>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="card">
            <h2>Välkommen!</h2>
            <p>Du har 2 nya meddelanden och 3 kommande uppgifter.</p>
        </div>

        <div class="card">
            <h2>Dagens schema</h2>

            <table class="schedule-table">
                <tr>
                    <th>Tid</th>
                    <th>Ämne</th>
                    <th>Sal</th>
                </tr>

                </tr>

                </tr>
            </table>
        </div>

    </div>
</div>

</html>
