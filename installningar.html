<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inställningar</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
}

header {
    background: #C40064;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 250px;
    background: white;
    padding: 20px;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

.sidebar ul {
    list-style: none;
}

.sidebar li {
    margin: 8px 0;
}

.sidebar a {
    text-decoration: none;
    color: black;
    display: block;
    padding: 12px;
    background: #eef2f7;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #dbe5f1;
}

.content {
    flex: 1;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #C40064;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.success {
    margin-top: 15px;
    color: green;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <h1>⚙️ Inställningar</h1>
</header>

<div class="container">

    <div class="sidebar">
        <ul>
            <li><a href="index.html">🏠 Startsida</a></li>
            <li><a href="Schema.html">📅 Schema</a></li>
            <li><a href="Uppgifter.html">📝 Uppgifter</a></li>
            <li><a href="Meddelande.html">📨 Meddelanden</a></li>
            <li><a href="Betyg.html">📊 Betyg</a></li>
            <li><a href="installningar.html">⚙️ Inställningar</a></li>
        </ul>
    </div>

    <div class="content">

        <div class="card">
            <h2>Personliga inställningar</h2>

            <label>Namn</label>
            <input type="text" id="namn" placeholder="Skriv ditt namn">

            <label>E-post</label>
            <input type="email" id="epost" placeholder="Skriv din e-post">

            <label>Språk</label>
            <select id="sprak">
                <option>Svenska</option>
                <option>English</option>
                <option>العربية</option>
            </select>

            <button onclick="sparaInställningar()">
                Spara inställningar
            </button>

            <p id="status" class="success"></p>
        </div>

    </div>

</div>

<script>
function sparaInställningar() {

    let namn = document.getElementById("namn").value;
    let epost = document.getElementById("epost").value;
    let sprak = document.getElementById("sprak").value;

    localStorage.setItem("namn", namn);
    localStorage.setItem("epost", epost);
    localStorage.setItem("sprak", sprak);

    document.getElementById("status").innerHTML =
        "✅ Inställningarna har sparats!";
}

window.onload = function() {

    document.getElementById("namn").value =
        localStorage.getItem("namn") || "";

    document.getElementById("epost").value =
        localStorage.getItem("epost") || "";

    document.getElementById("sprak").value =
        localStorage.getItem("sprak") || "Svenska";
}
</script>

</body>
</html>
