<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inställningar</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    color: #333;
}

header {
    background: #C40064;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: 30px auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
    margin-top: 0;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    background: #C40064;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.dark-mode {
    background: #1e1e1e;
    color: white;
}

.dark-mode .card {
    background: #2d2d2d;
}

.dark-mode input,
.dark-mode select {
    background: #444;
    color: white;
    border: 1px solid #666;
}
</style>
</head>
<body>

<header>
    <h1>Inställningar</h1>
</header>

<div class="container">
    <div class="card">

        <h2>Konto</h2>

        <label for="namn">Namn</label>
        <input type="text" id="namn" placeholder="Ditt namn">

        <label for="epost">E-post</label>
        <input type="email" id="epost" placeholder="dinmail@example.com">

        <label for="tema">Tema</label>
        <select id="tema">
            <option value="light">Ljust läge</option>
            <option value="dark">Mörkt läge</option>
        </select>

        <button onclick="sparaInställningar()">Spara inställningar</button>

        <p id="status"></p>

    </div>
</div>

<script>
function sparaInställningar() {
    const namn = document.getElementById("namn").value;
    const epost = document.getElementById("epost").value;
    const tema = document.getElementById("tema").value;

    localStorage.setItem("namn", namn);
    localStorage.setItem("epost", epost);
    localStorage.setItem("tema", tema);

    if (tema === "dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

    document.getElementById("status").textContent =
        "Inställningarna har sparats!";
}

window.onload = function() {
    const namn = localStorage.getItem("namn");
    const epost = localStorage.getItem("epost");
    const tema = localStorage.getItem("tema");

    if (namn) document.getElementById("namn").value = namn;
    if (epost) document.getElementById("epost").value = epost;
    if (tema) {
        document.getElementById("tema").value = tema;

        if (tema === "dark") {
            document.body.classList.add("dark-mode");
        }
    }
};
</script>

</body>
</html>
