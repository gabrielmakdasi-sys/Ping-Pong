<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betygsöversikt</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    color: #1a1a1a;
}

header {
    background: #C40064;
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
}

.logo {
    position: absolute;
    top: 10px;
    left: 20px;
    width: 70px;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
}

.card {
    background: white;
    padding: 25px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: left;
}

th {
    background: #003366;
    color: white;
}

tr:hover {
    background: #f0f0f0;
    cursor: pointer;
}

button {
    background: #C40064;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #a00050;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.message {
    background: #f8f8f8;
    padding: 10px;
    margin-top: 10px;
    border-left: 4px solid #C40064;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h1>Betygsöversikt</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Registrerade kurser</h2>

        <table>
            <tr>
                <th>Kurs</th>
                <th>Betyg</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Matematik</td>
                <td>E</td>
                <td>Avslutad</td>
            </tr>

            <tr>
                <td>Programmering</td>
                <td>D</td>
                <td>Avslutad</td>
            </tr>
        </table>
    </div>

    <div class="card">
        <h2>Meddela din lärare</h2>

        <label>Kurs</label>
        <input type="text" id="kurs" placeholder="t.ex. Programmering">

        <label>Meddelande</label>
        <textarea id="meddelande" rows="4" placeholder="Skriv ditt meddelande..."></textarea>

        <button onclick="skickaMeddelande()">Skicka</button>

        <div id="meddelandeLista"></div>
    </div>

</div>

<script>
function skickaMeddelande() {
    let kurs = document.getElementById("kurs").value;
    let text = document.getElementById("meddelande").value;

    if (kurs === "" || text === "") {
        alert("Fyll i både kurs och meddelande!");
        return;
    }

    let box = document.createElement("div");
    box.className = "message";
    box.innerHTML = "<b>" + kurs + "</b><br>" + text;

    document.getElementById("meddelandeLista").appendChild(box);

    document.getElementById("kurs").value = "";
    document.getElementById("meddelande").value = "";
}
</script>

</body>
</html>
