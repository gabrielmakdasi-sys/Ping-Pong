<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skolportal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
}

header {
    background: #003366;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 250px;
    background: white;
    padding: 20px;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

.sidebar ul {
    list-style: none;
}

.sidebar li {
    padding: 12px;
    margin: 5px 0;
    background: #eef2f7;
    border-radius: 8px;
    cursor: pointer;
}

.sidebar li:hover {
    background: #dbe5f1;
}

.content {
    flex: 1;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.schedule-table {
    width: 100%;
    border-collapse: collapse;
}

.schedule-table th,
.schedule-table td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

.schedule-table th {
    background: #003366;
    color: white;
}
</style>
</head>
<body>

<header>
    <h1>Skolportal</h1>
</header>

<div class="container">

    <div class="sidebar">
        <ul>
            <li>🏠 Startsida</li>
            <li>📅 Schema</li>
            <li>📝 Uppgifter</li>
            <li>📨 Meddelanden</li>
            <li>📊 Betyg</li>
            <li>⚙️ Inställningar</li>
        </ul>
    </div>

    <div class="content">

        <div class="card">
            <h2>Välkommen!</h2>
            <p>Du har 2 nya meddelanden och 3 kommande uppgifter.</p>
        </div>

        <div class="card">
            <h2>Dagens schema</h2>

            <table class="schedule-table">
                <tr>
                    <th>Tid</th>
                    <th>Ämne</th>
                    <th>Sal</th>
                </tr>
                <tr>
                    <td>08:00</td>
                    <td>Matematik</td>
                    <td>A101</td>
                </tr>
                <tr>
                    <td>10:00</td>
                    <td>Engelska</td>
                    <td>B204</td>
                </tr>
                <tr>
                    <td>13:00</td>
                    <td>Programmering</td>
                    <td>D302</td>
                </tr>
            </table>
        </div>

    </div>

</div>

</body>
</html>
